name: Release Windows Package

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag:
        description: Existing tag to build and upload ZIP package
        required: true
        type: string

permissions:
  contents: write

jobs:
  build-and-release:
    runs-on: windows-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Resolve release tag
        id: vars
        shell: pwsh
        run: |
          if ("${{ github.event_name }}" -eq "workflow_dispatch") {
            "tag=${{ github.event.inputs.tag }}" >> $env:GITHUB_OUTPUT
          } else {
            "tag=${{ github.ref_name }}" >> $env:GITHUB_OUTPUT
          }

      - name: Build Windows executable
        run: |
          pyinstaller --onefile --noconsole --name VoiceInput --add-data "web;web" server.py

      - name: Package zip for release
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Path release -Force | Out-Null
          Copy-Item "dist/VoiceInput.exe" "release/VoiceInput.exe" -Force
          Compress-Archive -Path "release/VoiceInput.exe" -DestinationPath "dist/VoiceInput-${{ steps.vars.outputs.tag }}-windows.zip" -Force

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: VoiceInput-windows-zip
          path: dist/VoiceInput-${{ steps.vars.outputs.tag }}-windows.zip
          if-no-files-found: error

      - name: Create or update GitHub Release asset
        uses: softprops/action-gh-release@v2
        with:
          files: dist/VoiceInput-${{ steps.vars.outputs.tag }}-windows.zip
          tag_name: ${{ steps.vars.outputs.tag }}
          generate_release_notes: true
          draft: false
