name: Release Windows EXE

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      tag:
        description: Existing release tag to upload VoiceInput.exe to (for manual rerun)
        required: true
        type: string

permissions:
  contents: write

jobs:
  build-and-upload:
    runs-on: windows-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Build Windows executable
        run: |
          pyinstaller --onefile --noconsole --name VoiceInput --add-data "web;web" server.py

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: VoiceInput-exe
          path: dist/VoiceInput.exe
          if-no-files-found: error

      - name: Upload exe to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/VoiceInput.exe
          tag_name: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.tag || github.event.release.tag_name }}
